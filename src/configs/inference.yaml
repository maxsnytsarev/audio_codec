defaults:
  - model: soundstream
  - metrics: audio
  - datasets: libri_test # we do not want to run inference on training data
  - dataloader: librispeech
  - transforms: librispeech
  - _self_
inferencer:
  device_tensors: ["data_object"] # which tensors should be on device (ex. GPU)
  device: auto # device name or "auto"
  save_path: "librispeech_test_clean" # any name here, can be a dataset name
  seed: 1
  from_pretrained: "saved/model_best.pth" # path to the pretrained model
